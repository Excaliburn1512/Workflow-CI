name: MLflow CI - Train & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      n_estimators:
        description: 'Jumlah estimator Random Forest'
        required: false
        default: '100'

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 \
                      scikit-learn \
                      pandas \
                      numpy \
                      matplotlib \
                      seaborn

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . \
            --env-manager=local \
            -P n_estimators=${{ github.event.inputs.n_estimators || '100' }} \
            -P random_state=42 \
            -P test_size=0.2

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          RUN_ID=$(python -c "
          import os

          mlruns_path = 'MLProject/mlruns'
          latest_run_id = None
          latest_time = 0

          for exp_id in os.listdir(mlruns_path):
              exp_path = os.path.join(mlruns_path, exp_id)
              if not os.path.isdir(exp_path):
                  continue
              for run_id in os.listdir(exp_path):
                  meta_path = os.path.join(exp_path, run_id, 'meta.yaml')
                  if not os.path.exists(meta_path):
                      continue
                  with open(meta_path) as f:
                      for line in f:
                          if 'start_time' in line:
                              t = int(line.split(':')[1].strip())
                              if t > latest_time:
                                  latest_time = t
                                  latest_run_id = run_id
                              break

          print(latest_run_id)
          ")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Latest MLflow run_id: $RUN_ID"

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Upload to Google Drive
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ env.RUN_ID }}
          path: MLProject/mlruns/
          retention-days: 30

      - name: Build Docker Model
        run: |
          # Cari path artifacts model
          MODEL_PATH=$(find MLProject/mlruns -type d -name "model" | head -1)
          echo "Model path: $MODEL_PATH"
          mlflow models build-docker \
            --model-uri "$MODEL_PATH" \
            --name "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag \
            "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model" \
            "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model:latest"
          docker tag \
            "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model" \
            "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model:${{ github.sha }}"
          echo "Tagged: latest & ${{ github.sha }}"

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model:${{ github.sha }}"
          echo "Pushed: https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model"