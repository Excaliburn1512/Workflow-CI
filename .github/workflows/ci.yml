name: MLflow CI - Train & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'MLProject/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      n_estimators:
        description: 'Jumlah estimator Random Forest'
        required: false
        default: '100'

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 \
                      scikit-learn \
                      pandas \
                      numpy \
                      matplotlib \
                      seaborn

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . \
            --env-manager=local \
            -P n_estimators=${{ github.event.inputs.n_estimators || '100' }} \
            -P random_state=42 \
            -P test_size=0.2

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          RUN_ID=$(python -c "
          import os, json

          mlruns_path = 'MLProject/mlruns'

          # Cari semua run di semua experiment
          latest_run_id = None
          latest_time = 0

          for exp_id in os.listdir(mlruns_path):
              exp_path = os.path.join(mlruns_path, exp_id)
              if not os.path.isdir(exp_path):
                  continue
              for run_id in os.listdir(exp_path):
                  meta_path = os.path.join(exp_path, run_id, 'meta.yaml')
                  if not os.path.exists(meta_path):
                      continue
                  with open(meta_path) as f:
                      content = f.read()
                  # Ambil start_time dari meta.yaml
                  for line in content.splitlines():
                      if 'start_time' in line:
                          t = int(line.split(':')[1].strip())
                          if t > latest_time:
                              latest_time = t
                              latest_run_id = run_id
                          break

          print(latest_run_id)
          ")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Latest MLflow run_id: $RUN_ID"

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Upload to Google Drive
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
          python -c "
          import os, json
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2 import service_account

          creds_json = json.loads(os.environ['GDRIVE_CREDENTIALS'])
          creds = service_account.Credentials.from_service_account_info(
              creds_json,
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=creds)
          folder_id = os.environ['GDRIVE_FOLDER_ID']
          run_id    = os.environ['RUN_ID']

          artifact_path = f'MLProject/mlruns'

          uploaded = 0
          for root, dirs, files in os.walk(artifact_path):
              for filename in files:
                  filepath = os.path.join(root, filename)
                  file_metadata = {'name': f'{run_id}_{filename}', 'parents': [folder_id]}
                  media = MediaFileUpload(filepath, resumable=True)
                  result = service.files().create(
                      body=file_metadata, media_body=media, fields='id'
                  ).execute()
                  print(f'Uploaded: {filename} -> {result.get(\"id\")}')
                  uploaded += 1

          print(f'Total uploaded: {uploaded} files')
          "
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          RUN_ID: ${{ env.RUN_ID }}

      - name: Build Docker Model
        run: |
          mlflow models build-docker \
            --model-uri "MLProject/mlruns/0/${{ env.RUN_ID }}/artifacts/model" \
            --name "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag \
            "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model" \
            "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model:latest"
          docker tag \
            "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model" \
            "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model:${{ github.sha }}"
          echo "Tagged: latest & ${{ github.sha }}"

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model:${{ github.sha }}"
          echo "Pushed to: https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/customer-churn-model"